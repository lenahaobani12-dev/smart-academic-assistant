<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Academic Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .container { padding: 1.5rem; max-width: 820px; margin: 0 auto; }
  .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #666; margin-bottom: 1.25rem; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .section-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .input-grid { display: grid; grid-template-columns: 1fr 160px 80px auto; gap: 8px; align-items: center; margin-bottom: 6px; }
  input[type=text], input[type=number], select {
    padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px;
    font-size: 13px; background: #fff; color: #1a1a1a; width: 100%;
  }
  input:focus, select:focus { outline: none; border-color: #555; }
  .btn { padding: 8px 14px; border-radius: 8px; border: 1px solid #ccc; background: transparent; color: #1a1a1a; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .btn:hover { background: #f0f0f0; }
  .btn-primary { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
  .btn-danger-sm { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; padding: 4px 9px; font-size: 11px; border-radius: 8px; cursor: pointer; border: 1px solid; }
  .hint { font-size: 11px; color: #aaa; margin-bottom: 10px; }
  .task-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fafafa; margin-bottom: 6px; }
  .task-text { flex: 1; font-size: 13px; }
  .task-meta { font-size: 11px; color: #aaa; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 8px; font-weight: 600; }
  .b-Task { background: #dbeafe; color: #1e40af; }
  .b-Exam { background: #fee2e2; color: #b91c1c; }
  .b-Reminder { background: #fef9c3; color: #854d0e; }
  .b-Other { background: #f0f0f0; color: #555; border: 1px solid #ddd; }
  .b-loading { background: #f0f0f0; color: #aaa; }
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
  .metric { background: #f5f5f5; border-radius: 8px; padding: 10px; text-align: center; }
  .metric-val { font-size: 22px; font-weight: 600; }
  .metric-lab { font-size: 11px; color: #888; margin-top: 2px; }
  .stress-badge { display: inline-block; padding: 4px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .s-Low { background: #dcfce7; color: #166534; }
  .s-Medium { background: #fef9c3; color: #854d0e; }
  .s-High { background: #fee2e2; color: #b91c1c; }
  .alert-box { padding: 9px 13px; border-radius: 8px; margin-bottom: 7px; font-size: 13px; }
  .a-warn { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
  .a-danger { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
  .a-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
  .row-right { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  .empty { text-align: center; padding: 1.5rem; color: #aaa; font-size: 13px; }
  .stress-row { display: flex; align-items: center; gap: 10px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎓 Smart Academic Assistant</h1>
    <p>Add each task separately with its own deadline. AI classifies every entry automatically.</p>
  </div>

  <div class="card">
    <div class="section-label">Add a task</div>
    <div class="input-grid">
      <input type="text" id="taskInput" placeholder="e.g. Final exam tomorrow, Submit lab report..." />
      <select id="catOverride">
        <option value="">Auto-classify</option>
        <option value="Task">Task</option>
        <option value="Exam">Exam</option>
        <option value="Reminder">Reminder</option>
        <option value="Other">Other</option>
      </select>
      <input type="number" id="daysInput" min="0" max="30" value="5" title="Days to exam" placeholder="Days" />
      <button class="btn btn-primary" onclick="addTask()">Add</button>
    </div>
    <div class="hint">Set "Days to exam" individually for each task. Press Enter or click Add.</div>
  </div>

  <div class="card">
    <div class="top-bar">
      <div class="section-label" style="margin:0;">Task list</div>
      <button class="btn-danger-sm" onclick="clearAll()">Clear all</button>
    </div>
    <div id="tasksList"><div class="empty">No tasks yet — add one above.</div></div>
    <div class="row-right">
      <button class="btn btn-primary" onclick="analyzeAll()" style="padding:9px 24px; font-size:14px;">Analyze Stress</button>
    </div>
  </div>

  <div id="resultsSection" style="display:none;">
    <div class="card">
      <div class="section-label">Summary</div>
      <div class="metrics-grid" id="metricsGrid"></div>
      <div class="stress-row">
        <span style="font-size:13px;color:#888;">Stress level:</span>
        <span class="stress-badge" id="stressLabel"></span>
      </div>
    </div>
    <div class="card">
      <div class="section-label">Alerts &amp; Suggestions</div>
      <div id="alertsList"></div>
    </div>
  </div>
</div>

<script>
let tasks = [];

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function todayStr(){
  return new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}

function addTask(){
  const inp = document.getElementById('taskInput');
  const text = inp.value.trim();
  if(!text) return;
  const days = Math.max(0, parseInt(document.getElementById('daysInput').value) || 0);
  const override = document.getElementById('catOverride').value;
  const id = Date.now() + Math.random();
  tasks.push({ id, text, label: override || null, loading: !override, date: todayStr(), days });
  inp.value = '';
  renderTasks();
  if(!override) classifyTask(id, text);
}

document.getElementById('taskInput').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });

const LABEL_MAP = {
  task:'Task', exam:'Exam', reminder:'Reminder', other:'Other',
  Task:'Task', Exam:'Exam', Reminder:'Reminder', Other:'Other',
  TASK:'Task', EXAM:'Exam', REMINDER:'Reminder', OTHER:'Other'
};

function normalizeLabel(raw){
  if(!raw) return 'Other';
  const s = raw.trim();
  if(LABEL_MAP[s]) return LABEL_MAP[s];
  const low = s.toLowerCase();
  if(low.includes('exam')) return 'Exam';
  if(low.includes('task')||low.includes('assignment')||low.includes('homework')) return 'Task';
  if(low.includes('reminder')||low.includes('remind')) return 'Reminder';
  return 'Other';
}

function classifyTask(id, text){
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:20,
      system:`Classify this academic text into exactly one label. Reply with ONLY one word from this exact list:
Task
Exam
Reminder
Other

Rules:
- Exam: anything about tests, exams, finals, midterms, quizzes
- Task: assignments, projects, homework, lab reports, presentations
- Reminder: deadlines, meetings, submissions, due dates, registration
- Other: personal/social activities unrelated to academics`,
      messages:[{role:"user",content:text}]
    })
  })
  .then(r=>r.json())
  .then(data=>{
    const raw = data.content?.[0]?.text || '';
    const label = normalizeLabel(raw);
    const t = tasks.find(t=>t.id===id);
    if(t){ t.label=label; t.loading=false; }
    renderTasks();
  })
  .catch(()=>{
    const t = tasks.find(t=>t.id===id);
    if(t){ t.label='Other'; t.loading=false; }
    renderTasks();
  });
}

function removeTask(id){
  tasks = tasks.filter(t=>t.id!==id);
  renderTasks();
  if(tasks.length===0) document.getElementById('resultsSection').style.display='none';
}

function clearAll(){
  tasks=[];
  renderTasks();
  document.getElementById('resultsSection').style.display='none';
}

function renderTasks(){
  const list = document.getElementById('tasksList');
  if(tasks.length===0){ list.innerHTML='<div class="empty">No tasks yet — add one above.</div>'; return; }
  list.innerHTML = tasks.map(t=>`
    <div class="task-row">
      <div class="task-text">
        ${esc(t.text)}
        <span class="task-meta"> · ${t.date} · ${t.days}d to exam</span>
      </div>
      ${t.loading
        ? '<span class="badge b-loading">classifying...</span>'
        : `<span class="badge b-${t.label}">${t.label}</span>`}
      <button class="btn-danger-sm" onclick="removeTask(${t.id})">Remove</button>
    </div>
  `).join('');
}

function calcStress(taskC, examC, minDays){
  if(examC>0 && minDays<=3) return 'High';
  if(taskC>=4) return 'High';
  if(taskC>=2 || examC>0) return 'Medium';
  return 'Low';
}

function analyzeAll(){
  if(tasks.length===0){ alert('Add at least one task first.'); return; }
  if(tasks.some(t=>t.loading)){ alert('Please wait — some tasks are still being classified.'); return; }

  const counts={Task:0,Exam:0,Reminder:0,Other:0};
  tasks.forEach(t=>{ if(counts[t.label]!==undefined) counts[t.label]++; });

  const examTasks = tasks.filter(t=>t.label==='Exam');
  const minDays = examTasks.length>0
    ? Math.min(...examTasks.map(t=>t.days))
    : (tasks.length>0 ? Math.min(...tasks.map(t=>t.days)) : 30);

  const stress = calcStress(counts.Task, counts.Exam, minDays);

  document.getElementById('metricsGrid').innerHTML = [
    ['Tasks',counts.Task],['Exams',counts.Exam],['Reminders',counts.Reminder],['Other',counts.Other]
  ].map(([l,v])=>`<div class="metric"><div class="metric-val">${v}</div><div class="metric-lab">${l}</div></div>`).join('');

  const sl=document.getElementById('stressLabel');
  sl.textContent=stress; sl.className='stress-badge s-'+stress;

  const alerts=[];
  if(counts.Exam>0 && minDays<=3) alerts.push(['danger',`Exam in ${minDays} day(s) — start revising immediately and focus on high-priority topics.`]);
  if(stress==='High') alerts.push(['danger','High stress detected — take short breaks and reduce overload where possible.']);
  else if(stress==='Medium') alerts.push(['warn','Moderate stress — manage your time carefully and organize your priorities.']);
  if(counts.Task>=5) alerts.push(['warn','Too many tasks — break them into smaller steps and tackle urgent ones first.']);
  if(counts.Reminder>0) alerts.push(['warn',`You have ${counts.Reminder} reminder(s) — make sure not to miss any deadlines.`]);
  if(alerts.length===0) alerts.push(['success','No major risk detected. Keep following your current study plan.']);

  document.getElementById('alertsList').innerHTML = alerts.map(([type,msg])=>
    `<div class="alert-box a-${type}">${msg}</div>`).join('');

  document.getElementById('resultsSection').style.display='block';
}
</script>
</body>
</html>
